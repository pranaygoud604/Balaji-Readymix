<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Balaji Readymix & Bricks Industry</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--brick:#C0392B;--brick-dark:#922B21;--brick-light:#E74C3C;--gold:#D4AC0D;--dark:#1C1917;--surface:#FAFAF9;--white:#ffffff;--border:rgba(0,0,0,0.08);--text:#1C1917;--muted:#78716C;--radius:10px;--radius-lg:14px}
html,body{height:100%;font-family:system-ui,-apple-system,sans-serif;background:var(--surface);color:var(--text);font-size:14px;line-height:1.5}
#app{min-height:100vh;display:flex;flex-direction:column}

/* NAV */
nav{background:var(--dark);display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;flex-shrink:0;position:sticky;top:0;z-index:50}
.nav-brand{display:flex;align-items:center;gap:10px;cursor:pointer;text-decoration:none}
.nav-logo{width:34px;height:34px;background:var(--brick);clip-path:polygon(0 0,84% 0,100% 16%,100% 100%,16% 100%,0 84%);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nav-title-main{color:#fff;font-weight:700;font-size:14px;letter-spacing:0.02em}
.nav-title-sub{color:rgba(255,255,255,0.45);font-size:11px;letter-spacing:0.05em}
.nav-links{display:flex;gap:2px}
.nav-link{color:rgba(255,255,255,0.55);padding:7px 14px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:500;transition:.15s;border:none;background:none}
.nav-link:hover,.nav-link.active{color:#fff;background:rgba(255,255,255,0.1)}
.nav-right{display:flex;align-items:center;gap:8px}
.cart-btn{position:relative;background:var(--brick);color:#fff;border:none;border-radius:8px;padding:7px 16px;cursor:pointer;font-size:13px;font-weight:600;display:flex;align-items:center;gap:7px;transition:.15s}
.cart-btn:hover{background:var(--brick-dark)}
.cart-badge{background:#fff;color:var(--brick);border-radius:12px;padding:1px 6px;font-size:11px;font-weight:700;min-width:20px;text-align:center;line-height:18px}
.user-btn{color:rgba(255,255,255,0.65);background:none;border:1px solid rgba(255,255,255,0.15);border-radius:8px;padding:6px 14px;cursor:pointer;font-size:13px;font-weight:500;transition:.15s}
.user-btn:hover{border-color:rgba(255,255,255,0.35);color:#fff}

/* PAGES */
.page{display:none;flex:1;flex-direction:column}
.page.active{display:flex}

/* HOME HERO */
.hero{background:var(--dark);color:#fff;padding:72px 28px 60px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 80% at 70% 50%,rgba(192,57,43,0.18),transparent 60%)}
.hero-inner{position:relative;max-width:560px}
.hero-eyebrow{display:flex;align-items:center;gap:10px;color:var(--gold);font-size:11px;font-weight:700;letter-spacing:0.3em;text-transform:uppercase;margin-bottom:18px}
.hero-eyebrow::before{content:'';width:28px;height:2px;background:var(--gold)}
.hero h1{font-size:clamp(36px,5vw,62px);font-weight:800;line-height:1.05;margin-bottom:6px}
.hero h1 .accent{color:var(--brick-light);display:block}
.hero h1 .sub{color:rgba(255,255,255,0.4);font-size:.52em;font-weight:400;display:block;margin-top:4px}
.hero p{color:rgba(255,255,255,0.55);font-size:15px;line-height:1.75;margin:20px 0 32px;max-width:440px}
.hero-btns{display:flex;gap:12px;flex-wrap:wrap}
.btn-hero{background:var(--brick);color:#fff;border:none;border-radius:var(--radius);padding:13px 28px;cursor:pointer;font-size:14px;font-weight:700;letter-spacing:.02em;transition:.15s}
.btn-hero:hover{background:var(--brick-dark);transform:translateY(-1px)}
.btn-hero-ghost{background:transparent;color:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.25);border-radius:var(--radius);padding:12px 28px;cursor:pointer;font-size:14px;font-weight:600;transition:.15s}
.btn-hero-ghost:hover{border-color:rgba(255,255,255,0.55);color:#fff}

/* STATS */
.stats-bar{background:var(--brick);display:grid;grid-template-columns:repeat(4,1fr)}
.stat-item{padding:16px 12px;text-align:center;border-right:1px solid rgba(255,255,255,0.12)}
.stat-item:last-child{border-right:none}
.stat-num{color:#fff;font-size:24px;font-weight:800;line-height:1}
.stat-label{color:rgba(255,255,255,0.65);font-size:11px;margin-top:3px}

/* SECTIONS */
.section{padding:40px 28px}
.section-hd{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:22px}
.section-title{font-size:22px;font-weight:700}
.see-all{color:var(--brick);font-size:13px;cursor:pointer;font-weight:600;background:none;border:none}
.see-all:hover{text-decoration:underline}

/* PRODUCT CARDS */
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.product-card{background:var(--white);border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;transition:.2s}
.product-card:hover{box-shadow:0 8px 24px rgba(0,0,0,0.1);transform:translateY(-3px);border-color:rgba(192,57,43,0.25)}
.prod-img{height:150px;display:flex;align-items:center;justify-content:center;font-size:48px;position:relative}
.prod-img.bricks{background:linear-gradient(135deg,#7B241C,#C0392B)}
.prod-img.concrete{background:linear-gradient(135deg,#4A4A4A,#7F8C8D)}
.prod-img.materials{background:linear-gradient(135deg,#5D4037,#8D6E63)}
.prod-badge{position:absolute;top:10px;left:10px;background:var(--gold);color:#412402;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px}
.prod-cat{color:var(--muted);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.prod-name{font-weight:700;font-size:15px;margin-bottom:5px;line-height:1.3}
.prod-desc{color:var(--muted);font-size:12px;line-height:1.5;margin-bottom:12px}
.prod-footer{display:flex;align-items:flex-end;justify-content:space-between}
.prod-price{font-size:20px;font-weight:800;color:var(--brick)}
.prod-unit{font-size:11px;color:var(--muted);font-weight:400}
.prod-min{font-size:10px;color:var(--muted);margin-top:2px}
.add-btn{background:var(--brick);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;transition:.15s;white-space:nowrap}
.add-btn:hover{background:var(--brick-dark)}
.prod-body{padding:14px}

/* FEATURES */
.features-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.feature-card{background:var(--white);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:20px;border-top:3px solid var(--brick)}
.feat-icon{font-size:28px;margin-bottom:10px;display:block}
.feat-title{font-weight:700;margin-bottom:5px}
.feat-desc{color:var(--muted);font-size:12px;line-height:1.6}

/* PRODUCTS PAGE */
.toolbar{padding:16px 28px;display:flex;gap:10px;align-items:center;border-bottom:0.5px solid var(--border);background:var(--white);position:sticky;top:56px;z-index:40}
.search-box{flex:1;border:0.5px solid var(--border);border-radius:var(--radius);padding:9px 14px;font-size:13px;outline:none;transition:.15s;background:var(--surface)}
.search-box:focus{border-color:var(--brick);background:var(--white)}
.filter-sel{border:0.5px solid var(--border);border-radius:var(--radius);padding:8px 12px;font-size:13px;background:var(--white);cursor:pointer;outline:none}
.products-page-grid{padding:20px 28px;display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}

/* CART */
.cart-wrap{display:grid;grid-template-columns:1fr 300px;gap:20px;padding:24px 28px;flex:1;align-items:start}
.cart-title{font-size:18px;font-weight:700;margin-bottom:16px}
.cart-items{display:flex;flex-direction:column;gap:12px}
.cart-item{background:var(--white);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px;display:flex;gap:14px;align-items:center}
.ci-img{width:60px;height:60px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.ci-info{flex:1;min-width:0}
.ci-name{font-weight:700;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-price{color:var(--muted);font-size:12px}
.ci-bulk{color:#15803d;font-size:11px;font-weight:600}
.qty-ctrl{display:flex;align-items:center;gap:8px}
.qty-btn{width:30px;height:30px;border:0.5px solid var(--border);border-radius:7px;background:var(--white);cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;font-weight:600;transition:.15s;line-height:1}
.qty-btn:hover{background:var(--surface);border-color:var(--brick);color:var(--brick)}
.qty-val{font-weight:700;font-size:14px;min-width:50px;text-align:center}
.ci-total{text-align:right;flex-shrink:0}
.ci-total-amt{font-weight:800;font-size:16px}
.remove-btn{font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;display:block;margin-top:4px}
.remove-btn:hover{color:var(--brick)}

/* SUMMARY */
.order-summary{background:var(--white);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:20px;position:sticky;top:80px}
.summary-title{font-weight:700;font-size:16px;margin-bottom:16px}
.sum-row{display:flex;justify-content:space-between;margin-bottom:9px;font-size:13px;color:var(--muted)}
.sum-row.total{font-weight:800;font-size:17px;color:var(--text);border-top:0.5px solid var(--border);padding-top:10px;margin-top:6px;margin-bottom:0}
.coupon-wrap{display:flex;gap:6px;margin:14px 0}
.coupon-in{flex:1;border:0.5px solid var(--border);border-radius:8px;padding:8px 11px;font-size:13px;outline:none;font-family:monospace;text-transform:uppercase}
.coupon-in:focus{border-color:var(--brick)}
.coupon-apply{background:var(--surface);border:0.5px solid var(--border);border-radius:8px;padding:8px 13px;cursor:pointer;font-size:12px;font-weight:700;color:var(--brick);transition:.15s}
.coupon-apply:hover{background:#fef2f2;border-color:rgba(192,57,43,0.3)}
.discount-row{display:none;justify-content:space-between;font-size:13px;color:#15803d;margin-bottom:9px}
.checkout-btn{width:100%;background:var(--brick);color:#fff;border:none;border-radius:var(--radius);padding:14px;font-size:14px;font-weight:800;cursor:pointer;margin-top:16px;transition:.15s;letter-spacing:.02em}
.checkout-btn:hover{background:var(--brick-dark)}
.pay-note{text-align:center;font-size:11px;color:var(--muted);margin-top:10px;line-height:1.6}
.empty-cart{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--muted);padding:60px}
.empty-icon{font-size:56px;opacity:.35}

/* ORDERS */
.orders-wrap{padding:24px 28px;flex:1}
.orders-list{display:flex;flex-direction:column;gap:14px;margin-top:16px}
.order-card{background:var(--white);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:18px}
.order-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.order-num{font-weight:800;font-family:monospace;font-size:15px}
.order-date{color:var(--muted);font-size:12px;margin-top:2px}
.order-items-preview{font-size:13px;color:var(--muted);margin-bottom:12px}
.order-bottom{display:flex;justify-content:space-between;align-items:center;border-top:0.5px solid var(--border);padding-top:12px}
.order-total{font-weight:800;font-size:16px}
.status-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700}
.s-delivered{background:#dcfce7;color:#15803d}
.s-dispatched{background:#fef9c3;color:#854d0e}
.s-pending{background:#f3f4f6;color:#374151}
.s-confirmed{background:#dbeafe;color:#1d4ed8}
.s-cancelled{background:#fef2f2;color:#b91c1c}

/* CONTACT */
.contact-wrap{display:grid;grid-template-columns:1fr 1.4fr;gap:24px;padding:24px 28px;flex:1}
.contact-info-cards{display:flex;flex-direction:column;gap:12px}
.info-card{background:var(--white);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px;display:flex;gap:14px}
.info-icon{width:44px;height:44px;background:#fef2f2;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.info-title{font-weight:700;margin-bottom:4px}
.info-lines{color:var(--muted);font-size:12px;line-height:1.7}
.contact-form{background:var(--white);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:24px}
.form-title{font-size:18px;font-weight:700;margin-bottom:20px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group.full{grid-column:1/-1}
.form-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.form-input{border:0.5px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;outline:none;font-family:inherit;transition:.15s}
.form-input:focus{border-color:var(--brick)}
textarea.form-input{resize:vertical;min-height:90px}
.submit-btn{background:var(--brick);color:#fff;border:none;border-radius:var(--radius);padding:12px 24px;font-size:14px;font-weight:700;cursor:pointer;margin-top:16px;transition:.15s;width:100%}
.submit-btn:hover{background:var(--brick-dark)}

/* ADMIN */
.admin-shell{display:flex;flex:1;min-height:0}
.sidebar{width:200px;background:var(--dark);flex-shrink:0;padding:14px 8px;display:flex;flex-direction:column}
.sidebar-section{color:rgba(255,255,255,0.3);font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:6px 10px 8px}
.sidebar-item{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:8px;cursor:pointer;color:rgba(255,255,255,0.5);font-size:13px;font-weight:500;margin-bottom:2px;border:none;background:none;width:100%;text-align:left;transition:.15s}
.sidebar-item:hover,.sidebar-item.active{background:rgba(255,255,255,0.1);color:#fff}
.sidebar-item svg{flex-shrink:0;opacity:.7}
.sidebar-item.active svg{opacity:1}
.sidebar-bottom{margin-top:auto;padding-top:12px;border-top:0.5px solid rgba(255,255,255,0.08)}
.admin-main{flex:1;overflow:auto;background:var(--surface);padding:24px}
.admin-pg{display:none}
.admin-pg.active{display:block}
.admin-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.admin-hd h2{font-size:20px;font-weight:700}
.admin-action-btn{background:var(--brick);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer}
.admin-action-btn:hover{background:var(--brick-dark)}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}
.kpi{background:var(--white);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px}
.kpi-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-bottom:8px}
.kpi-value{font-size:26px;font-weight:800;line-height:1}
.kpi-trend{font-size:11px;margin-top:5px;font-weight:600}
.up{color:#15803d}.down{color:#b91c1c}

/* CHARTS */
.charts-row{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:22px}
.chart-card{background:var(--white);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:18px}
.chart-card-title{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:14px;text-transform:uppercase;letter-spacing:.05em}
.bar-chart{display:flex;align-items:flex-end;gap:7px;height:100px}
.bc-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;height:100%}
.bc-bar{background:var(--brick);border-radius:3px 3px 0 0;width:100%;transition:.4s}
.bc-label{font-size:10px;color:var(--muted)}
.legend{display:flex;flex-direction:column;gap:10px}
.legend-item{display:flex;align-items:center;gap:8px;font-size:12px}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* TABLE */
.data-table{background:var(--white);border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.table-header{display:grid;background:var(--surface);border-bottom:0.5px solid var(--border);padding:10px 16px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.table-row{display:grid;padding:12px 16px;border-bottom:0.5px solid var(--border);font-size:13px;align-items:center;transition:.1s;cursor:pointer}
.table-row:last-child{border-bottom:none}
.table-row:hover{background:var(--surface)}

/* INVENTORY */
.inv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.inv-card{background:var(--white);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px}
.inv-card.low{border-color:rgba(192,57,43,0.35);background:#fef9f9}
.inv-name{font-weight:700;font-size:14px;margin-bottom:3px}
.inv-wh{font-size:11px;color:var(--muted);margin-bottom:10px}
.inv-stat{display:flex;justify-content:space-between;font-size:12px;margin-top:5px}
.inv-stat-label{color:var(--muted)}
.inv-stat-val{font-weight:600}
.progress{background:#f3f4f6;border-radius:4px;height:6px;margin-top:10px;overflow:hidden}
.progress-fill{background:var(--brick);height:100%;border-radius:4px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:.2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-box{background:var(--white);border-radius:var(--radius-lg);width:360px;max-width:90vw;overflow:hidden;transform:scale(.95);transition:.2s}
.modal-overlay.open .modal-box{transform:scale(1)}
.modal-head{padding:18px 20px;border-bottom:0.5px solid var(--border);font-weight:700;font-size:16px;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:none;border:none;cursor:pointer;font-size:20px;color:var(--muted);line-height:1;padding:2px}
.modal-body{padding:20px}
.modal-foot{padding:14px 20px;border-top:0.5px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.btn-cancel{background:var(--surface);border:0.5px solid var(--border);border-radius:8px;padding:8px 16px;cursor:pointer;font-size:13px;font-weight:600}
.btn-confirm{background:var(--brick);color:#fff;border:none;border-radius:8px;padding:8px 16px;cursor:pointer;font-size:13px;font-weight:700;transition:.15s}
.btn-confirm:hover{background:var(--brick-dark)}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--dark);color:#fff;padding:12px 18px;border-radius:var(--radius);font-size:13px;font-weight:500;border-left:3px solid var(--brick);z-index:9999;transform:translateY(60px);opacity:0;transition:.3s;max-width:300px}
.toast.visible{transform:translateY(0);opacity:1}

/* SUCCESS */
.success-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 28px;flex:1;text-align:center}
.success-icon{width:80px;height:80px;background:#dcfce7;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:20px}
.cta-section{background:var(--brick);padding:40px 28px;text-align:center}
.cta-section h2{color:#fff;font-size:26px;font-weight:800;margin-bottom:8px}
.cta-section p{color:rgba(255,255,255,0.7);font-size:14px;margin-bottom:22px}

@media(max-width:768px){
  .nav-links{display:none}
  .stats-bar{grid-template-columns:repeat(2,1fr)}
  .cart-wrap{grid-template-columns:1fr}
  .contact-wrap{grid-template-columns:1fr}
  .charts-row{grid-template-columns:1fr}
  .kpi-row{grid-template-columns:repeat(2,1fr)}
  .form-grid{grid-template-columns:1fr}
  .admin-shell{flex-direction:column}
  .sidebar{width:100%;flex-direction:row;flex-wrap:wrap;padding:8px}
  .sidebar-section{display:none}
}
</style>
</head>
<body>
<div id="app">
  <!-- NAVBAR -->
  <nav>
    <div class="nav-brand" onclick="show('home')">
      <div class="nav-logo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><rect x="2" y="15" width="20" height="5" rx="1"/><rect x="2" y="8" width="20" height="6" rx="1"/><rect x="2" y="2" width="20" height="5" rx="1"/></svg>
      </div>
      <div>
        <div class="nav-title-main">Balaji Readymix & Bricks</div>
        <div class="nav-title-sub">JAYA
